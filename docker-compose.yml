services:
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: Production
      RabbitMQ__HostName: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMQ__UserName: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
      RabbitMQ__Port: ${RABBITMQ_PORT:-5672}
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING:-redis:6379}
      Redis__KeyPrefix: notifications:processed:
      Redis__Expiry: 1.00:00:00
      Email__Host: ${SMTP_HOST}
      Email__Port: ${SMTP_PORT:-587}
      Email__Username: ${SMTP_USER}
      Email__Password: ${SMTP_PASS}
      Twilio__AccountSid: ${TWILIO_SID}
      Twilio__AuthToken: ${TWILIO_TOKEN}
      Twilio__FromNumber: ${TWILIO_PHONE_NUMBER}
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
