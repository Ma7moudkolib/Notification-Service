services:
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: Production
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      Kafka__Topic: ${KAFKA_TOPIC:-notifications-topic}
      Kafka__GroupId: ${KAFKA_GROUP_ID:-notification-service}
      Kafka__AutoOffsetReset: ${KAFKA_AUTO_OFFSET_RESET:-Earliest}
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING:-redis:6379}
      Redis__KeyPrefix: notifications:processed:
      Redis__Expiry: 1.00:00:00
      Email__Host: ${SMTP_HOST}
      Email__Port: ${SMTP_PORT:-587}
      Email__Username: ${SMTP_USER}
      Email__Password: ${SMTP_PASS}
      Twilio__AccountSid: ${TWILIO_SID}
      Twilio__AuthToken: ${TWILIO_TOKEN}
      Twilio__FromNumber: ${TWILIO_PHONE_NUMBER}
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
